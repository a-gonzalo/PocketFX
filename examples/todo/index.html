<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejemplo PocketFX - ToDo</title>
    <!-- Pico CSS básico desde CDN -->
    <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@latest/css/pico.min.css">
    <!-- estilos de PocketFX (modales, etc.) -->
    <link rel="stylesheet" href="/src/core/pocketfx.css">
</head>
<body>
    <main class="container">
        <h1>ToDo demo</h1>
        <div id="app"></div>
    </main>

    <script type="module">
        import { SceneManager } from '/build/pocketfx.esm.js';
        import { TodoController } from './src/controllers/TodoController.js';

        document.addEventListener('DOMContentLoaded', () => {
            const app = document.getElementById('app');
            SceneManager.setScene(app, TodoController);
        });
    </script>
</body>
</html>
